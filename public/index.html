<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 60px 20px 40px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .status-card {
      background: #fff;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      padding: 24px;
      margin: 32px 0;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
    }

    .status-row + .status-row {
      border-top: 1px solid #f0f0f0;
    }

    .label {
      font-weight: 600;
      color: #555;
    }

    .badge {
      display: inline-block;
      background: #2ea043;
      color: #fff;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.85rem;
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      text-align: left;
      padding: 12px 16px;
    }

    th {
      background: #f6f8fa;
      font-weight: 600;
      color: #555;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    td {
      border-top: 1px solid #e1e4e8;
    }

    code {
      background: #f0f3f6;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: #888;
      font-size: 0.85rem;
      border-top: 1px solid #e1e4e8;
    }
  </style>
</head>
<body>
  <main>
    <h1>Demo App</h1>
    <p>A simple Express.js API for demonstrating CI/CD workflows.</p>

    <div class="status-card">
      <div class="status-row">
        <span class="label">Message</span>
        <span>Hello from Demo App</span>
      </div>
      <div class="status-row">
        <span class="label">Status</span>
        <span class="badge">running</span>
      </div>
    </div>

    <h2>API Endpoints</h2>
    <table>
      <thead>
        <tr>
          <th>Method</th>
          <th>Path</th>
          <th>Description</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><code>GET</code></td>
          <td><code>/</code></td>
          <td>Returns app message and status</td>
        </tr>
        <tr>
          <td><code>GET</code></td>
          <td><code>/health</code></td>
          <td>Returns health check with uptime</td>
        </tr>
      </tbody>
    </table>
  </main>

  <footer>Deployed via GitHub Pages</footer>
</body>
</html>
